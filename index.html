<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base × Base App • Animated Explainer</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');

        :root {
            --base-blue: #0052FF;
            --base-cyan: #00F0FF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #0A0A0A;
            color: white;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Background Canvas - Clean & subtle */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            opacity: 0.65;
        }

        .container {
            position: relative;
            z-index: 2;
            height: 100vh;
            display: flex;
            flex-direction: column;
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .logo-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .base-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -1px;
        }

        .base-square {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, #0052FF, #00F0FF);
            border-radius: 9px;
            box-shadow: 0 0 20px #00F0FF, inset 0 0 12px rgba(255,255,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            color: white;
            transition: all 0.3s ease;
            position: relative;
        }

        .base-square::after {
            content: 'B';
            font-size: 23px;
            font-weight: 700;
        }

        .cartoon-logo {
            animation: wobble 2.8s infinite ease-in-out;
        }

        .handle {
            background: rgba(255,255,255,0.1);
            padding: 4px 13px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        .video-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 40px;
            overflow: hidden;
        }

        .scene {
            position: absolute;
            width: 100%;
            max-width: 820px;
            opacity: 0;
            transform: translateY(30px) scale(0.97);
            transition: all 800ms cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
        }

        .scene.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
        }

        .scene-content {
            text-align: center;
            position: relative;
        }

        .scene-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 48px;
            font-weight: 600;
            line-height: 1.05;
            margin-bottom: 20px;
            letter-spacing: -1.5px;
        }

        .scene-subtitle {
            font-size: 22px;
            color: #aaa;
            max-width: 620px;
            margin: 0 auto 36px;
            line-height: 1.45;
        }

        /* Scene 1 - Cleaner floating elements */
        .chain-animation {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 48px 0;
        }

        .block {
            width: 68px;
            height: 68px;
            background: linear-gradient(135deg, #0052FF, #00F0FF);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            box-shadow: 0 0 38px #00F0FF;
            animation: floatBlock 2.2s infinite ease-in-out;
        }

        .block:nth-child(2) { animation-delay: 180ms; }
        .block:nth-child(3) { animation-delay: 360ms; }
        .block:nth-child(4) { animation-delay: 540ms; }
        .block:nth-child(5) { animation-delay: 720ms; }

        /* Official Base branding */
        .official-base-logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.07);
            padding: 7px 18px;
            border-radius: 9999px;
            font-size: 24px;
            font-weight: 700;
            color: #00F0FF;
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.25);
        }

        /* Base App Mockup - More compact & premium */
        .app-mockup {
            width: 320px;
            height: 600px;
            background: linear-gradient(180deg, #111, #1a1a1a);
            border-radius: 52px;
            margin: 32px auto;
            position: relative;
            box-shadow: 
                0 0 70px rgba(0, 242, 255, 0.45),
                inset 0 0 50px rgba(255,255,255,0.15);
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .app-mockup:hover {
            transform: scale(1.04) rotate(2deg);
        }

        .app-header {
            height: 74px;
            background: linear-gradient(90deg, #0052FF, #00F0FF);
            display: flex;
            align-items: center;
            padding: 0 24px;
            color: white;
            font-weight: 700;
            font-size: 19px;
            gap: 12px;
        }

        .app-screen {
            padding: 22px;
            text-align: center;
            color: white;
            height: calc(100% - 74px);
            overflow-y: auto;
        }

        .post {
            background: rgba(255,255,255,0.09);
            border-radius: 22px;
            padding: 18px;
            margin-bottom: 18px;
            animation: postPop 2.1s infinite ease-in-out;
            box-shadow: 0 8px 25px rgba(0, 240, 255, 0.2);
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Features - Clean grid */
        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 24px;
            margin-top: 32px;
        }

        .feature-card {
            background: rgba(255,255,255,0.07);
            border-radius: 24px;
            padding: 28px;
            text-align: left;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(12px);
        }

        .feature-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 35px rgba(0, 242, 255, 0.35);
        }

        .feature-icon {
            font-size: 46px;
            margin-bottom: 18px;
        }

        /* Community - Compact cards */
        .community-grid {
            display: flex;
            justify-content: center;
            gap: 24px;
            flex-wrap: wrap;
            margin: 48px 0;
        }

        .follow-card {
            background: rgba(255,255,255,0.07);
            border-radius: 24px;
            padding: 26px 32px;
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 260px;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            text-decoration: none;
            color: white;
        }

        .follow-card:hover {
            transform: scale(1.06);
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.45);
            background: rgba(0, 240, 255, 0.12);
        }

        .follow-icon {
            font-size: 52px;
            filter: drop-shadow(0 0 15px #00F0FF);
        }

        /* Shoutout banner - Single, elegant */
        .shoutout-banner {
            background: linear-gradient(90deg, rgba(0,82,255,0.12), rgba(0,240,255,0.12));
            border: 2px solid #00F0FF;
            border-radius: 9999px;
            padding: 16px 32px;
            margin: 32px auto;
            max-width: 620px;
            text-align: center;
            font-size: 20px;
            font-weight: 600;
            color: #00F0FF;
            box-shadow: 0 0 40px rgba(0, 240, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        /* Referral - Premium & clean */
        .referral-card {
            background: linear-gradient(135deg, rgba(0,82,255,0.12), rgba(0,240,255,0.12));
            border: 3px solid #00F0FF;
            border-radius: 32px;
            padding: 32px;
            max-width: 520px;
            margin: 32px auto;
            text-align: center;
            box-shadow: 0 0 55px rgba(0, 240, 255, 0.4);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .referral-card:hover {
            transform: scale(1.03);
            box-shadow: 0 0 70px rgba(0, 240, 255, 0.55);
        }

        .referral-card h3 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            margin-bottom: 10px;
            color: #00F0FF;
        }

        /* Controls - Minimal & centered */
        .controls {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 20px;
            background: rgba(10,10,10,0.9);
            padding: 12px 28px;
            border-radius: 9999px;
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(18px);
            z-index: 10;
            box-shadow: 0 0 35px rgba(0, 240, 255, 0.25);
        }

        button {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14.5px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            color: #00F0FF;
            transform: scale(1.08);
        }

        .play-btn {
            background: var(--base-blue);
            color: white;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 0 0 35px #0052FF;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .play-btn:hover {
            transform: scale(1.15);
        }

        .timeline {
            width: 380px;
            height: 7px;
            background: rgba(255,255,255,0.18);
            border-radius: 9999px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: linear-gradient(90deg, #00F0FF, #0052FF);
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 18px #00F0FF;
        }

        .scene-indicator {
            display: flex;
            gap: 10px;
        }

        .dot {
            width: 11px;
            height: 11px;
            background: rgba(255,255,255,0.25);
            border-radius: 50%;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        .dot.active {
            background: #00F0FF;
            box-shadow: 0 0 16px #00F0FF;
            transform: scale(1.4);
        }

        /* Share button */
        #share-btn {
            background: #1DA1F2;
            color: white;
            padding: 12px 24px;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 20px #1DA1F2;
            transition: all 0.3s ease;
        }

        #share-btn:hover {
            transform: scale(1.07);
        }

        /* Keyframes - Smoother & refined */
        @keyframes floatBlock {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-28px) rotate(8deg); }
        }

        @keyframes postPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes wobble {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.05); }
        }

        .glow-text {
            text-shadow: 0 0 40px #00F0FF;
        }

        .floating-logo {
            position: absolute;
            animation: floatLogo 7s infinite ease-in-out;
            opacity: 0.65;
            z-index: 3;
            filter: drop-shadow(0 0 25px #00F0FF);
        }

        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(8deg); }
        }

        /* Made by - Clean */
        .made-by {
            position: fixed;
            bottom: 24px;
            right: 36px;
            z-index: 999;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #00F0FF;
            text-shadow: 0 0 12px #00F0FF;
            opacity: 0.9;
            display: flex;
            align-items: center;
            gap: 6px;
            pointer-events: auto;
        }

        .made-by:hover {
            opacity: 1;
            transform: scale(1.05);
        }

        /* Mobile - Perfect fit */
        @media (max-width: 768px) {
            .container { max-width: 100%; }
            header { padding: 14px 20px; }
            .scene { max-width: 100%; padding: 0 20px; }
            .scene-title { font-size: 38px; }
            .app-mockup { width: 280px; height: 520px; }
            .controls { padding: 10px 20px; gap: 12px; bottom: 18px; }
            .timeline { width: 210px; }
            .shoutout-banner { margin: 24px auto; padding: 14px 24px; font-size: 18px; }
        }
    </style>
</head>
